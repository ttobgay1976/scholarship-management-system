<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BSA Fund Request Verification</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid p-2 bg-body-secondary">BSA Fund Request Verification</div>

    <div class="mt-3 px-3">
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success mb-3">
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error}" class="alert alert-danger mb-3">
            <span th:text="${error}"></span>
        </div>

        <!-- Pending Requests Selection -->
        <div th:if="${pendingRequests != null and !pendingRequests.empty}">
            <!-- <h5 class="mb-3">Pending Fund Requests</h5>
            <span class="badge bg-warning mb-3" th:text="${pendingRequests.size()} + ' requests'"></span> -->
            
            <table class="table table-bordered table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Request ID</th>
                        <th>BSA</th>
                        <th>Event Type</th>
                        <th>Activity Description</th>
                        <th>Requested Amount</th>
                        <th>Request Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="request : ${pendingRequests}">
                        <td th:text="${request.fundRequestId}"></td>
                        <td th:text="${request.bsaName}"></td>
                        <td th:text="${request.eventType}"></td>
                        <td th:text="${#strings.abbreviate(request.activityDescription, 50)}"></td>
                        <td th:text="${#numbers.formatDecimal(request.requestedAmount, 0, 2)} + ' Nu.'"></td>
                        <td th:text="${#temporals.format(request.requestDate, 'MMM dd, yyyy')}"></td>
                        <td>
                            <a th:href="@{/bsa-fund-request/verify/{id}(id=${request.fundRequestId})}" 
                               class="btn btn-primary btn-sm">
                                Verify
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- No Pending Requests -->
        <!-- <div class="card" th:if="${pendingRequests == null or pendingRequests.empty}">
            <div class="card-body text-center py-5">
                <h5>No Pending Fund Requests</h5>
                <p class="text-muted">There are no fund requests pending verification at this time.</p>
                <a href="/bsa-fund-request/list" class="btn btn-secondary">
                    Back to List
                </a>
            </div>
        </div> -->

        <!-- Single Request Verification (when ID is provided) -->
        <div th:if="${fundRequest}">
            <h5 class="mb-3">Fund Request Details</h5>
            <span class="badge bg-info mb-3" th:text="${fundRequest.fundRequestStatus}"></span>
            
            <!-- Request Information -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <strong>Request ID:</strong>
                    <span th:text="${fundRequest.fundRequestId}"></span>
                </div>
                <div class="col-md-6">
                    <strong>BSA:</strong>
                    <span th:text="${fundRequest.bsaName}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Event Type:</strong>
                    <span th:text="${fundRequest.eventType}"></span>
                </div>
                <div class="col-md-6">
                    <strong>Requested Amount:</strong>
                    <span th:text="${#numbers.formatDecimal(fundRequest.requestedAmount, 0, 2)} + ' Nu.'"></span>
                </div>
            </div>

                <div class="row mb-4">
            <div class="col-12">
                <strong>Activity Description:</strong>
                <p th:text="${fundRequest.activityDescription}"></p>
            </div>
        </div>

            <!-- Verification Form -->
            <form th:action="@{/bsa-fund-request/verify/{id}(id=${fundRequest.fundRequestId})}" 
                  th:object="${verificationForm}" method="post">
                
                <!-- Hidden Fields -->
                <input type="hidden" th:field="*{fundRequestId}" />

                <!-- Decision Options -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h6>Verification Decision</h6>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="verifierStatus" value="VERIFIED" th:field="*{verifierStatus}" id="verifyOption">
                            <label class="form-check-label" for="verifyOption">
                                <strong>Verify</strong> - Approve and forward to Chief
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="verifierStatus" value="REJECTED" th:field="*{verifierStatus}" id="rejectOption">
                            <label class="form-check-label" for="rejectOption">
                                <strong>Reject</strong> - Reject this fund request
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Approved Amount (shown only when verified) -->
                <div class="row mb-4" id="approvedAmountSection" style="display: none;">
                    <div class="col-md-6">
                        <label for="approvedAmount" class="form-label">Approved Amount (Nu.)</label>
                        <input type="number" class="form-control" id="approvedAmount" th:field="*{approvedAmount}" step="0.01" min="0">
                    </div>
                </div>

                <!-- Remarks -->
                <div class="row mb-4">
                    <div class="col-12">
                        <label for="verifierRemarks" class="form-label">Verification Remarks</label>
                        <textarea class="form-control" id="verifierRemarks" th:field="*{verifierRemarks}" rows="3" required></textarea>
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            Submit Verification
                        </button>
                        <a href="/bsa-fund-request/verify" class="btn btn-secondary">
                            Back to Pending Requests
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Show/hide approved amount based on decision
        document.querySelectorAll('input[name="verifierStatus"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const approvedAmountSection = document.getElementById('approvedAmountSection');
                if (this.value === 'VERIFIED') {
                    approvedAmountSection.style.display = 'block';
                } else {
                    approvedAmountSection.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>
