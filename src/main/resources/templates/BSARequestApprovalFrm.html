<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

<style>
    .status-badge {
        padding: 0.35em 0.65em;
        font-size: 0.75em;
        font-weight: 600;
        border-radius: 0.25rem;
    }
    
    .status-pending {
        background-color: #fef3c7;
        color: #92400e;
    }
    
    .status-approved {
        background-color: #d1fae5;
        color: #065f46;
    }
    
    .status-rejected {
        background-color: #fee2e2;
        color: #991b1b;
    }
    
    .stats-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
    }
    
    .stats-card h5 {
        margin: 0;
        font-size: 0.9rem;
        opacity: 0.9;
    }
    
    .stats-card h3 {
        margin: 5px 0 0 0;
        font-size: 2rem;
        font-weight: 700;
    }
    
    .action-buttons .btn {
        margin-right: 5px;
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
    }
</style>

</head>

<body>
	<section layout:fragment="content">

		<div class="container-fluid p-2 bg-body-secondary">BSA Registration
			Requests</div>

		<div class="mt-3 px-3">
			<table class="table table-bordered table-hover mt-3">
				<thead class="table-dark">
					<tr>
						<th>Request ID</th>
						<th>BSA Name</th>
						<th>President CID</th>
						<th>Vice President CID</th>
						<th>Location</th>
						<th>Status</th>
						<th>Submitted Date</th>
						<th>Submitted By</th>
						<th>Action</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${#lists.isEmpty(requests)}">
						<td colspan="8" class="text-center">No BSA requests found.</td>
					</tr>
					<tr th:each="request : ${requests}">
						<td th:text="${request.requestId}"></td>
						<td th:text="${request.bsaName}"></td>
						<td th:text="${request.presidentCid}"></td>
						<td th:text="${request.vicePresidentCid}"></td>
						<td>
							<span th:text="${request.cityName + ', ' + request.stateName + ', ' + request.countryName}"></span>
						</td>
						<td>
							<span class="status-badge"
								  th:classappend="${request.requestStatus.name() == 'PENDING' ? 'status-pending' : 
								                 request.requestStatus.name() == 'APPROVED' ? 'status-approved' : 'status-rejected'}"
								  th:text="${request.requestStatus.displayName}"></span>
						</td>
						<td th:text="${#temporals.format(request.submittedDate, 'dd-MM-yyyy HH:mm')}"></td>
						<td th:text="${request.submittedBy}"></td>
						<td class="action-buttons" style="display: flex;">
							<a th:href="@{/bsa-request/view/{id}(id=${request.requestId})}"
							   class="btn btn-primary btn-sm" title="View Details">
								View
							</a>

							<a th:href="@{/bsa-request/approve/{id}(id=${request.requestId})}"
							   class="btn btn-success btn-sm" title="View Details">
								Approve
							</a>
							   
							<!-- <th:block th:if="${request.requestStatus.name() == 'PENDING'}">
								<form th:action="@{/bsa-request/approve/{id}(id=${request.requestId}, action='process')}" 
                      				method="post" class="approval-form">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
									
									<h6 class="mb-3 text-success">
										<i class="fas fa-check-circle me-2"></i>Approve Request
									</h6>
									
									<div class="mb-3">
										<label for="approveRemarks" class="form-label">Approval Remarks (Optional)</label>
										<textarea class="form-control" id="approveRemarks" name="remarks" rows="3" 
												placeholder="Enter any remarks for this approval..."></textarea>
									</div>
									
									<div class="d-flex gap-2">
										<button type="submit" class="btn btn-success" 
											onclick="return confirm('Are you sure you want to approve this BSA request?');">
											<i class="fas fa-check me-2"></i>Approve
										</button>
									</div>
								</form>
							</th:block> -->
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</section>
</body>
</html>
