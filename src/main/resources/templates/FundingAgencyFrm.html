<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/dashboard}">
<head>
<meta charset="ISO-8859-1">
<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>
</head>
<section layout:fragment="content">
	<div class="container p-2 bg-body-secondary">Add Funding Agency</div>
	<div class="container mt-3">
		<!-- Success message -->

		<div th:if="${message}" class="alert alert-success"
			th:text="${message}"></div>
		<form th:action="@{/master/addfindingagency}"
			th:object="${fundingaagencydto}" method="post" autocomplete="off">
			<div class="row mb-3">
				<label for="fundingAgencyName" class="col-sm-2 col-form-label">Funding Agency
					Name:</label>
				<div class="col-sm-4">
					<input type="text" th:field="*{fundingAgencyName}"
						id="fundingAgencyName" name="fundingAgencyName"
						class="form-control" placeholder="Enter Funding Agency Name"
						required>
				</div>
			</div>
			<div class="row mb-3">
				<label for="description" class="col-sm-2 col-form-label">Description
					:</label>
				<div class="col-sm-4">
					<input type="text" th:field="*{description}"
						id="description" name="description"
						class="form-control" placeholder="Enter Description"
						required>
				</div>
			</div>
			<!-- CSRF Token -->
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<div class="row mb-3">
				<div class="col-sm-6 mx-auto">
					<button type="submit" class="btn btn-primary">Save</button>
				</div>
			</div>
		</form>

	</div>
</section>

<th:block
	th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>

</html>
