<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>
<body>

	<section layout:fragment="content">
		<div class="container p-2 bg-body-secondary">Scholarship Program
			Registration</div>
		<div class="container mt-3">
			<!-- Success message -->

			<div th:if="${message}" class="alert alert-success"
				th:text="${message}"></div>
			<form th:action="@{/master/savescholarshipprogramregistration}"
				th:object="${scholarshipProgramdto}" method="post"
				autocomplete="off">
				<div class="row mb-3">
					<input type="hidden" th:field="*{id}" /> <label
						for="scholarshipProgramName" class="col-sm-3 col-form-label">Scholarship
						Program Name:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{scholarshipProgramName}"
							id="scholarshipProgramName" name="scholarshipProgramName"
							class="form-control" placeholder="Enter Scholarship Program Name"
							required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="scholarshipFundingSource"
						class="col-sm-3 col-form-label">Funding Source :</label>
					<div class="col-sm-4">
						<select id="countrySelect" class="form-select"
							th:field="*{fundingAgencyId}">
							<option value="" selected>Select Funding Agency</option>
							<option th:each="agency : ${fundingagencylst}"
								th:value="${agency.id}" th:text="${agency.fundingAgencyName}">
						</select>
					</div>
				</div>
				<div class="row mb-3">
					<label for="scholarshipAvailableSlots"
						class="col-sm-3 col-form-label">Slots Available:</label>
					<div class="col-sm-4">
						<input type="number" th:field="*{scholarshipAvailableSlots}"
							id="scholarshipAvailableSlots" name="scholarshipAvailableSlots"
							class="form-control" placeholder="Enter Slots Available" required>
					</div>
				</div>
				<!-- CSRF Token -->
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<div class="row mb-3">
					<div class="col-sm-6 mx-auto">
						<button type="submit" class="btn btn-primary">Save</button>
					</div>
				</div>
			</form>

		</div>
	</section>
	<!-- JS Fragment -->
	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>
</body>
</html>
