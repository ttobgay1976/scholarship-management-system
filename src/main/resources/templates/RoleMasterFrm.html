
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>
<body>
	<section layout:fragment="content">
		<div class="container-fluid p-2 bg-body-secondary">Roles Management
			Page</div>
		<div class="mt-3">
			<!-- Success message -->

			<div th:if="${message}" class="alert alert-success"
				th:text="${message}"></div>
				
			<form th:action="@{/role/addrole}" th:object="${role}" method="post"
				autocomplete="off" id="roles">
				<div class="row mb-3">
					<label for="roleId" class="col-sm-2 col-form-label text-end"> ID:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{roleId}" id="roleId" name="roleId"
							class="form-control" disabled="disabled"
							placeholder="ID Auto Generatied">
					</div>
				</div>
				<div class="row mb-3">
					<label for="roleName" class="col-sm-2 col-form-label text-end">Role
						Name:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{roleName}" id="roleName"
							name="roleName" class="form-control"
							placeholder="Enter Role Name" required>
					</div>
				</div>
				<!-- CSRF Token -->
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<div class="row mb-3">
					<div class="col-sm-6 mx-auto">
						<button type="submit" class="btn btn-primary">Save</button>
					</div>
				</div>
			</form>

		</div>
	</section>
	<!-- JS Fragment -->
	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>
</body>
</html>
