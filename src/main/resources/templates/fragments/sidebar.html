	<ul class="sidebar-menu" id="menus">

		<li th:each="menu : ${menus}" class="menu-item">
			<!-- SINGLE MENU (NO CHILDREN) --> <a
			th:if="${menu.children == null or menu.children.isEmpty()}"
			th:href="@{${menu.menuUrl}}" target="contentFrame" class="menu-link"
			th:text="${menu.menuName}"> </a> <!-- PARENT MENU (NO CLICK ACTION, JUST LABEL) -->
			<div th:if="${menu.children != null and !menu.children.isEmpty()}"
				class="menu-link parent-menu">

				<span th:text="${menu.menuName}"></span> <span class="arrow">▶</span>

			</div> <!-- CHILD MENU -->
			<ul class="submenu"
				th:if="${menu.children != null and !menu.children.isEmpty()}">

				<li th:each="child : ${menu.children}"><a
					th:href="@{${child.menuUrl}}" target="contentFrame"
					class="submenu-link" th:text="${child.menuName}"> </a></li>

			</ul>

		</li>

	</ul>
