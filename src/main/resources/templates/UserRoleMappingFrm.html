
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>
<body>
	<section layout:fragment="content">
		<div class="container p-2 bg-body-secondary">User Role
			Management Page</div>
		<div class="container p-4">
			<!-- Success message -->

			<div th:if="${message}" class="alert alert-success"
				th:text="${message}"></div>

			<!-- Registration Form -->
			<form th:action="@{/user/userrolemap}" th:object="${userrolemap}"
				method="post" autocomplete="off" id="userRolemap">
				<div class="row mb-3">
					<label for="id" class="col-sm-2 col-form-label text-end"> ID:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{id}" id="id" class="form-control"
							placeholder="Auto Update" disabled="disabled">
					</div>
				</div>
				<div class="row mb-3">
					<label for="users" class="col-sm-2 col-form-label text-end">User Namw/ID: </label>
					<div class="col-sm-4">
						<select id="userSelect" name="id" class="form-select">
							<option value="" selected>Select User</option>
							<option th:each="user : ${users}" th:value="${user.id}"
								th:text="${user.username}"></option>
						</select>
					</div>
				</div>
				<div class="row mb-3">
					<label for="role" class="col-sm-2 col-form-label text-end">Assign Role: </label>
					<div class="col-sm-4" id="rolesContainer">
						<fieldset class="border p-2">
							<legend class="w-auto fs-5">Asign Roles </legend>
							<div th:each="role : ${roles}">
								<input type="checkbox" class="role-checkbox"
									th:id="'role-' + ${role.roleId}" th:name="roleIds"
									th:value="${role.roleId}" />
								<!-- value submitted -->
								<label th:for="'role-' + ${role.roleId}"
									th:text="${role.roleName}"></label>
							</div>
						</fieldset>
					</div>
				</div>

				<hr>
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<div class="row mb-3">
					<div class="col-sm-4 mx-auto">
						<button type="submit" class="btn btn-primary">Update User
							Roles</button>
					</div>
				</div>
			</form>
		</div>
	</section>
	<!-- JS Fragment -->
	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>
</body>
</html>
