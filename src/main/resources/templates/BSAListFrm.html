<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>

<body>
	<section layout:fragment="content">

		<div class="container-fluid p-2 bg-body-secondary">BSA
			Details Page</div>

		<div class="mt-3 px-3">
			<table class="table table-bordered table-hover mt-3">
				<thead class="table-dark">
					<tr>
						<th>BSA Code</th>
						<th>BSA Name</th>
						<th>Country</th>
						<th>State</th>
						<th>City</th>
						<th>Description</th>
						<th>Status</th>
						<th>Action</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="bsa : ${bsas}">
						<td th:text="${bsa.bsaCode}"></td>
						<td th:text="${bsa.bsaName}"></td>
						<td th:text="${bsa.countryName}"></td>
						<td th:text="${bsa.stateName}"></td>
						<td th:text="${bsa.cityName}"></td>
						<td th:text="${bsa.description}"></td>
						<td>
							<span class="badge" 
								  th:classappend="${bsa.status == 'ACTIVE' ? 'bg-success' : 'bg-secondary'}"
								  th:text="${bsa.status}"></span>
						</td>
						<td>
							<a th:href="@{/bsa/registration/edit/{id}(id=${bsa.bsaId})}"
							   class="btn btn-primary btn-sm">Edit</a>
							<a th:href="@{/bsa/registration/deactivate/{id}(id=${bsa.bsaId})}"
							   class="btn btn-warning btn-sm"
							   onclick="return confirm('Are you sure you want to deactivate this BSA?');">
							   Deactivate
							</a>
							<a th:href="@{/bsa/registration/delete/{id}(id=${bsa.bsaId})}"
							   class="btn btn-danger btn-sm"
							   onclick="return confirm('Are you sure you want to delete this record?');">
							   Delete
							</a>
						</td>
					</tr>
				</tbody>
			</table>
			
			<!-- Add New BSA Button -->
			<div class="mt-3">
				<a th:href="@{/bsa/registrationfrm}" class="btn btn-primary">
					<i class="fas fa-plus"></i> Add New BSA
				</a>
			</div>
		</div>

	</section>
</body>
</html>
