
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>
<body>
	<section layout:fragment="content">
		<div class="container p-2 bg-body-secondary">Bank Registration
			Page</div>
		<div class="container mt-3">
			<!-- Success message -->

			<div th:if="${message}" class="alert alert-success"
				th:text="${message}"></div>
			<form th:action="@{/master/addcollegebank}" th:object="${bank}"
				method="post" autocomplete="off">
				<input type="hidden" th:field="*{id}" />
				<div class="row mb-3">
					<label for="scholarshipFundingSource"
						class="col-sm-2 col-form-label">College Name :</label>
					<div class="col-sm-4">
						<select id="collegeId" class="form-select" th:field="*{collegeId}">
							<option value="" selected>Select College</option>
							<option th:each="colge : ${colleges}" th:value="${colge.id}"
								th:text="${colge.collegeName}">
						</select>
					</div>
				</div>
				<div class="row mb-3">
					<label for="accountHolderName" class="col-sm-2 col-form-label">Account
						Holder Name:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{accountHolderName}"
							id="accountHolderName" name="accountHolderName"
							class="form-control" placeholder="Enter Account Holder Name"
							required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="bankName" class="col-sm-2 col-form-label"> Bank
						Name:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{bankName}" id="bankName"
							name="bankName" class="form-control"
							placeholder="Enter Bank Name" required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="branchName" class="col-sm-2 col-form-label">Bank
						Branch Name :</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{branchName}" id="branchName"
							name="branchName" class="form-control"
							placeholder="Enter Bank Branch Name" required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="accountNo" class="col-sm-2 col-form-label">Bank
						Account No. :</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{accountNo}" id="accountNo"
							name="accountNo" class="form-control"
							placeholder="Enter Bank Account Number" required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="ifscSwiftCode" class="col-sm-2 col-form-label">Bank
						IFSC/SWIFT Code. :</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{ifscSwiftCode}" id="ifscSwiftCode"
							name="ifscSwiftCode" class="form-control"
							placeholder="Enter Bank ifscSwiftCode Number" required>
					</div>
				</div>
				<!-- CSRF Token -->
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<div class="row mb-3">
					<div class="col-sm-6 mx-auto">
						<button type="submit" class="btn btn-primary">Save</button>
					</div>
				</div>
			</form>

		</div>
	</section>
	<!-- JS Fragment -->
	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>
</body>
</html>
