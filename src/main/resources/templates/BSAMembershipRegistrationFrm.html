<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSA Membership Registration - SPRMS</title>
    
    <!-- CSRF Token -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --secondary-bg: #f4f6f9;
            --card-border: #e9ecef;
            --text-main: #212529;
            --text-muted: #6c757d;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Layout Structure */
        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
            min-height: 100vh;
        }

        /* Main Content */
        #content {
            width: 100%;
            padding: 30px;
            transition: all 0.3s;
        }

        /* Card Styles */
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .card-header-custom {
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 20px 25px;
            border: none;
        }

        .card-body-custom {
            padding: 30px;
        }

        /* Form Styles */
        .form-label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }

        /* Button Styles */
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary-custom:hover {
            background: linear-gradient(135deg, var(--primary-hover), #004085);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .btn-secondary-custom {
            background: #6c757d;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-secondary-custom:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        /* Alert Styles */
        .alert-custom {
            border: none;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        /* Loading Spinner */
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* BSA Card */
        .bsa-card {
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bsa-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(13, 110, 253, 0.15);
        }

        .bsa-card.selected {
            border-color: var(--primary-color);
            background-color: rgba(13, 110, 253, 0.05);
        }

        /* Status Badge */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background-color: #d1e7dd;
            color: #0f5132;
        }

        .status-rejected {
            background-color: #f8d7da;
            color: #842029;
        }

        .status-verified {
            background-color: #cff4fc;
            color: #055160;
        }

        /* Student Fields Styling */
        .student-fields {
            transition: all 0.3s ease;
        }

        .student-fields.auto-populated {
            background-color: #ffff;
        }

        .student-fields.auto-populated .form-control {
            background-color: #f8f9fa;
            color: black;
            font-weight: 500;
        }

        .student-fields.auto-populated .form-label {
            color: black;
            font-weight: 600;
        }

        .student-fields.auto-populated .form-control:read-only {
            background-color: #e9ecef;
            border-color: #ced4da;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <!-- Loading Spinner -->
    <div class="spinner-overlay" id="loadingSpinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="wrapper">
        <!-- Main Content -->
        <div id="content">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1">
                        <i class="fas fa-user-plus me-2"></i>
                        BSA Membership Registration
                    </h2>
                    <p class="text-muted mb-0">Request membership to a Bhutanese Students Association</p>
                </div>
            </div>
            <!-- Registration Form Card -->
            <div class="card card-custom">
                <div class="card-header card-header-custom">
                    <h5 class="mb-0">
                        <i class="fas fa-edit me-2"></i>
                        Membership Request Form
                    </h5>
                </div>
                <div class="card-body card-body-custom">
                    <form id="membershipForm">
                        <!-- Student Information -->
                        <div id="studentInfoSection" class="student-fields">
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">CID Number (Optional)</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="studentCid" placeholder="Enter your CID number" maxlength="11">
                                        <button class="btn btn-outline-secondary" type="button" id="searchStudentBtn">
                                            <i class="fas fa-search"></i> Search
                                        </button>
                                    </div>
                                    <small class="text-muted">Enter your CID to auto-fill student details, or enter manually below</small>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Student ID</label>
                                    <input type="text" class="form-control" id="studentId" placeholder="Student ID">
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Student Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="studentName" placeholder="Enter your full name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Contact Number <span class="text-danger">*</span></label>
                                    <input type="tel" class="form-control" id="contactNumber" placeholder="Enter your contact number" required>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Email Address <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="emailAddress" placeholder="Enter your email address" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Program/Course</label>
                                    <input type="text" class="form-control" id="program" placeholder="Enter your program/course">
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-6">
                                    <label class="form-label">College/Institution</label>
                                    <textarea class="form-control" id="collegeName" placeholder="Enter your College"></textarea>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Address</label>
                                    <textarea class="form-control" id="address" rows="2" placeholder="Enter your address"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Select BSA <span class="text-danger">*</span></label>
                                    <select class="form-select" id="bsaSelect" name="bsaId" required>
                                        <option value="" selected disabled>-- Select BSA --</option>
                                        <option th:each="bsa : ${activeBSAs}" 
                                                th:value="${bsa.bsaId}"
                                                th:text="${bsa.bsaName}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Funding Type <span class="text-danger">*</span></label>
                                    <select class="form-select" id="fundingType" required>
                                        <option value="">Select Funding Type</option>
                                        <option value="GOVERNMENT_FUNDED">Government Funded</option>
                                        <option value="PRIVATELY_FUNDED">Privately Funded</option>
                                    </select>
                                </div>
                        </div>

                        <!-- Terms and Conditions -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                    <label class="form-check-label" for="termsCheck">
                                        I agree to the terms and conditions of BSA membership and understand that my request will be subject to approval by the BSA Vice President/President and verification by the Focal Officer.
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Buttons -->
                        <div class="row">
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary-custom me-2">
                                    <i class="fas fa-paper-plane me-2"></i>
                                    Submit Membership Request
                                </button>
                                <button type="button" class="btn btn-secondary-custom" onclick="resetForm()">
                                    <i class="fas fa-redo me-2"></i>
                                    Reset Form
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // Global variables
        let selectedBsaId = null;
        let currentUser = null;

        // Initialize page
        $(document).ready(function() {
            loadBSAList();
            setupCIDSearch();
        });

        // Setup CID search functionality
        function setupCIDSearch() {
            $('#searchStudentBtn').on('click', function() {
                searchStudentByCID();
            });

            $('#studentCid').on('keypress', function(e) {
                if (e.which === 13) {
                    e.preventDefault();
                    searchStudentByCID();
                }
            });

            $('#studentCid').on('keydown', function(e) {
                if (e.which === 9) { // Tab key
                    e.preventDefault();
                    searchStudentByCID();
                }
            });
        }

        // Search student by CID
        function searchStudentByCID() {
            const cid = $('#studentCid').val().trim();
            
            if (!cid) {
                showAlert('Please enter a CID number', 'warning');
                return;
            }

            if (cid.length !== 11) {
                showAlert('CID must be 11 digits', 'warning');
                return;
            }

            showLoading();
            
            $.ajax({
                url: '/api/students/search-by-cid/' + cid,
                method: 'GET',
                success: function(response) {
                    if (response.success && response.student) {
                        populateStudentFields(response.student);
                    } else {
                        showAlert('Invalid response from server', 'danger');
                    }
                    hideLoading();
                },
                error: function(xhr) {
                    if (xhr.status === 404) {
                        showAlert('Student not found with this CID. Please enter your details manually.', 'info');
                        // Clear fields for manual entry
                        clearStudentFields();
                        $('#studentName').focus();
                    } else {
                        showAlert('Error searching for student. Please try again.', 'danger');
                    }
                    hideLoading();
                }
            });
        }

        // Populate student fields from API response
        function populateStudentFields(student) {
            console.log('Populating student fields with data:', student);
            
            // Populate fields with student data
            $('#studentId').val(student.studentId || '');
            $('#studentName').val(student.fullName || student.name || '');
            $('#contactNumber').val(student.contactNumber || '');
            $('#emailAddress').val(student.emailAddress || student.email || '');
            $('#program').val(student.programCourse || student.program || '');
            $('#collegeName').val(student.collegeName || '');
            $('#address').val(student.address || '');
            
            // Add visual indication that fields are auto-populated
            $('.student-fields').addClass('auto-populated');
            
            // Make fields readonly since data is auto-populated
            $('#studentId').prop('readonly', true);
            $('#studentName').prop('readonly', true);
            $('#contactNumber').prop('readonly', true);
            $('#emailAddress').prop('readonly', true);
            $('#program').prop('readonly', true);
            $('#collegeName').prop('readonly', true);
            $('#address').prop('readonly', true);
            
            // Show info message with student details
            showAlert(`Student details populated for CID: ${student.cidNumber}`, 'info');
            
            // Scroll to student information section
            $('html, body').animate({
                scrollTop: $('#studentInfoSection').offset().top - 100
            }, 500);
        }

        // Clear student fields for manual entry
        function clearStudentFields() {
            $('#studentId').val('');
            $('#studentName').val('');
            $('#contactNumber').val('');
            $('#emailAddress').val('');
            $('#program').val('');
            $('#collegeName').val('');
            $('#address').val('');
            
            // Make fields editable for manual entry
            $('#studentId').prop('readonly', false);
            $('#studentName').prop('readonly', false);
            $('#contactNumber').prop('readonly', false);
            $('#emailAddress').prop('readonly', false);
            $('#program').prop('readonly', false);
            $('#collegeName').prop('readonly', false);
            $('#address').prop('readonly', false);
        }

        // Load BSA list
        function loadBSAList() {
            // BSA list is loaded via Thymeleaf template, no need for AJAX call
            console.log('BSA list loaded via template');
        }

        // Select BSA
        function selectBSA(bsaId) {
            selectedBsaId = bsaId;
            $('#selectedBsaId').val(bsaId);
        }

        
        // Get status class
        function getStatusClass(status) {
            switch(status) {
                case 'PENDING': return 'status-pending';
                case 'APPROVED': return 'status-approved';
                case 'REJECTED': return 'status-rejected';
                case 'VERIFIED': return 'status-verified';
                default: return 'status-pending';
            }
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        // Handle form submission
        $('#membershipForm').on('submit', function(e) {
            e.preventDefault();
            
            // Validate form fields
            if (!validateForm()) {
                return;
            }
            
            const formData = {
                bsaId: $('#bsaSelect').val(),
                fundingType: $('#fundingType').val(),
                // Include student information for manual entry cases
                studentCid: $('#studentCid').val().trim(),
                studentName: $('#studentName').val().trim(),
                contactNumber: $('#contactNumber').val().trim(),
                emailAddress: $('#emailAddress').val().trim(),
                program: $('#program').val().trim(),
                collegeName: $('#collegeName').val().trim(),
                address: $('#address').val().trim()
            };
            
            showLoading();
            $.ajax({
                url: '/api/bsa-membership/request',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                beforeSend: function(xhr) {
                    var token = $("meta[name='_csrf']").attr("content");
                    var header = $("meta[name='_csrf_header']").attr("content");
                    xhr.setRequestHeader(header, token);
                },
                success: function(response) {
                    showAlert('Membership request submitted successfully!', 'success');
                    resetForm();
                    hideLoading();
                },
                error: function(xhr) {
                    const errorMessage = xhr.responseJSON ? xhr.responseJSON.error : 'Error submitting membership request';
                    showAlert(errorMessage, 'danger');
                    hideLoading();
                }
            });
        });

        // Validate form fields
        function validateForm() {
            // Check required fields (CID is now optional)
            const requiredFields = ['studentName', 'contactNumber', 'emailAddress', 'bsaSelect', 'fundingType'];
            
            for (let field of requiredFields) {
                const value = $('#' + field).val().trim();
                if (!value) {
                    showAlert('Please fill in all required fields', 'warning');
                    $('#' + field).focus();
                    return false;
                }
            }
            
            // Validate CID format only if CID is provided
            const cid = $('#studentCid').val().trim();
            if (cid && (cid.length !== 11 || !/^\d+$/.test(cid))) {
                showAlert('CID must be exactly 11 digits if provided', 'warning');
                $('#studentCid').focus();
                return false;
            }
            
            // Validate email format
            const email = $('#emailAddress').val().trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'warning');
                $('#emailAddress').focus();
                return false;
            }
            
            // Validate contact number
            const contact = $('#contactNumber').val().trim();
            if (!/^\d+$/.test(contact) || contact.length < 8) {
                showAlert('Please enter a valid contact number', 'warning');
                $('#contactNumber').focus();
                return false;
            }
            
            // Check if BSA is selected
            if (!$('#bsaSelect').val()) {
                showAlert('Please select a BSA', 'warning');
                $('#bsaSelect').focus();
                return false;
            }
            
            return true;
        }

        // View membership details
        function viewMembershipDetails(membershipId) {
            // This would open a modal or navigate to details page
            console.log('View membership details:', membershipId);
        }

        // Reset form
        function resetForm() {
            $('#membershipForm')[0].reset();
            $('.bsa-card').removeClass('selected');
            selectedBsaId = null;
            $('#selectedBsaId').val('');
        }

        // Go back
        function goBack() {
            window.history.back();
        }

        // Show loading spinner
        function showLoading() {
            $('#loadingSpinner').show();
        }

        // Hide loading spinner
        function hideLoading() {
            $('#loadingSpinner').hide();
        }

        // Show alert
        function showAlert(message, type) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show alert-custom" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alertContainer').html(alertHtml);
        }
    </script>
</body>
</html>
