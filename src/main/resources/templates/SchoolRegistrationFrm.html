<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>

<body>
	<div class="container p-2 bg-body-secondary">School Registration
		Page</div>
	<div class="container mt-3">
		<!-- Success message -->

		<div th:if="${message}" class="alert alert-success"
			th:text="${message}"></div>
		<form th:action="@{/school/addschool}" th:object="${schooldto}"
			method="post" autocomplete="off" id="schoolForm">
			<div class="row mb-3">
				<input type="hidden" th:field="*{id}" /> <label for="schoolName"
					class="col-sm-2 col-form-label">School Name:</label>
				<div class="col-sm-4">
					<input type="text" th:field="*{schoolName}" id="schoolName"
						name="schoolName" class="form-control"
						placeholder="Enter School Name" required>
				</div>
			</div>
			<div class="row mb-3">
				<label for="schoolLocation" class="col-sm-2 col-form-label">School
					Location:</label>
				<div class="col-sm-4">
					<input type="text" th:field="*{schoolLocation}" id="schoolLocation"
						name="schoolLocation" class="form-control"
						placeholder="Enter Location" required>
				</div>
			</div>
			<div class="row mb-3">
				<label for="schoolCode" class="col-sm-2 col-form-label">School
					Code:</label>
				<div class="col-sm-4">
					<input type="text" th:field="*{schoolCode}" id="schoolCode"
						name="schoolCode" class="form-control"
						placeholder="Enter School Code" required>
				</div>
			</div>
			<div class="row mb-3">
				<label for="schoolType" class="col-sm-2 col-form-label">Description
					:</label>
				<div class="col-sm-4">
					<input type="text" th:field="*{schoolType}" id="schoolType"
						name="schoolType" class="form-control"
						placeholder="Enter School Type" required>
				</div>
			</div>
			<!-- CSRF Token -->
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<div class="row mb-3">
				<div class="col-sm-6 mx-auto">
					<button type="submit" class="btn btn-primary">Save</button>
				</div>
			</div>
		</form>

	</div>
	<!-- JS Fragment -->
	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>

</body>
