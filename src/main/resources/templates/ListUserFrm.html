
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>

</head>
<body>
	<section layout:fragment="content">

		<div class="container-fluid p-2 bg-body-secondary">Users List
			Page</div>

		<div class="mt-3 px-3">
			<table class="table table-bordered table-hover mt-3">
				<thead class="table-dark">
					<tr>
						<th>First Name</th>
						<th>Last Name</th>
						<th>CID</th>
						<th>Contact No.</th>
						<th>Status</th>
						<th>Action</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="user : ${users}">
						<td th:text="${user.firstname}"></td>
						<td th:text="${user.lastname}"></td>
						<td th:text="${user.cidno}"></td>
						<td th:text="${user.contactno}"></td>
						<td th:text="Active"></td>
						<td><a th:href="@{/master/edit/{id}(id=${user.Id})}"
							class="btn btn-primary btn-sm">Edit</a></td>
					</tr>
				</tbody>
			</table>
		</div>

	</section>
	<!-- JS Fragment -->
	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>
</body>
</html>
