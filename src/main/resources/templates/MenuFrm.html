
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<th:block
	th:replace="~{fragments/commonresource_css :: common_resource_css}"></th:block>



<script type="text/javascript">
	document.addEventListener("DOMContentLoaded", function() {
		const previewBtn = document.getElementById("previewBtn");
		const previewModal = document.getElementById("previewModal");
		const overlay = document.getElementById("overlay");
		const closePreview = document.getElementById("closePreview");

		previewBtn.addEventListener("click", function() {
			previewModal.style.display = "block";
			overlay.style.display = "block";
		});

		closePreview.addEventListener("click", function() {
			previewModal.style.display = "none";
			overlay.style.display = "none";
		});

		overlay.addEventListener("click", function() {
			previewModal.style.display = "none";
			overlay.style.display = "none";
		});
	});
</script>

</head>
<body>
	<section layout:fragment="content">
		<div class="container-fluid p-2 bg-body-secondary">Menu Management
			Page</div>
	<div class="mt-3 px-3">
			<!-- Success message -->

			<div th:if="${message}" class="alert alert-success"
				th:text="${message}"></div>
			<form th:action="@{/others/addmenu}" th:object="${menu}"
				method="post" autocomplete="off" id="roles">
				<div class="row mb-3">
					<label for="roleId" class="col-sm-2 col-form-label text-end"> ID:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{Id}" id="roleId" name="Id"
							class="form-control" disabled="disabled"
							placeholder="ID Auto Generatied">
					</div>
				</div>
				<div class="row mb-3">
					<label for="roleName" class="col-sm-2 col-form-label text-end">Menu
						Name:</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{menuName}" id="menuName"
							name="menuName" class="form-control"
							placeholder="Enter Menu Name" required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="menuUrl" class="col-sm-2 col-form-label text-end">Menu
						URL :</label>
					<div class="col-sm-4">
						<input type="text" th:field="*{menuUrl}" id="menuUrl"
							name="menuUrl" class="form-control" placeholder="Enter Menu URL"
							required>
					</div>
				</div>
				<div class="row mb-3">
					<label for="parentId" class="col-sm-2 col-form-label text-end">Parent
						Menu :</label>
					<div class="col-sm-4">
						<!-- 					<select id="users" class="form-select" th:field="*{parentId}">
						<option value="" selected>Select User</option>
						<option th:each="menu : ${menus}" th:value="${menu.id}"
							th:text="${menu.parent != null ? menu.parent.id : ''}"></option>
					</select>  -->

						<select th:field="*{parentId}" class="form-select">
							<option value="">Select Parent Menu</option>
							<option th:each="menu : ${menus}" th:value="${menu.id}"
								th:text="${menu.menuName}"></option>
						</select>
					</div>
				</div>
				<!-- CSRF Token -->
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<div class="row mb-3">
					<div class="col-sm-6 mx-auto">
						<button type="submit" class="btn btn-primary">Save Menu</button>
						<button type="reset" class="btn btn-primary">Reset</button>
						<button type="button" th:attr="id='previewBtn'"
							class="btn btn-primary">Preview</button>
					</div>
				</div>
			</form>

		</div>
		<!-- Modal & Overlay -->
		<div id="previewModal"
			style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 1px solid #ccc; padding: 20px; z-index: 1000; width: 850px; height: 700px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);">
			<h3>Menu Preview</h3>

			<table class="table table-bordered table-hover mt-3">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Menu Name</th>
						<th>Menu URL</th>
						<th>Parent</th>
						<th>Status</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="menu : ${menus}">
						<td th:text="${menu.id}"></td>
						<td th:text="${menu.menuName}"></td>
						<td th:text="${menu.menuUrl}"></td>
						<td
							th:text="${menu.parent != null ? menu.parent.menuName : 'None'}"></td>
						<td th:text="Active"></td>
					</tr>
					<tr th:if="${#lists.isEmpty(menus)}">
						<td colspan="5">No menus found</td>
					</tr>
				</tbody>
			</table>

			<button type="button" class="btn btn-primary" id="closePreview">Close</button>
		</div>

		<div id="overlay"
			style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 999;">
		</div>
	</section>



	<th:block
		th:replace="~{fragments/commonresource_js :: common_resource_js}"></th:block>
</body>
</html>
