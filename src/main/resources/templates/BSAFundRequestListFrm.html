<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BSA Fund Requests</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid p-2 bg-body-secondary">BSA Fund Requests</div>

    <div class="container mt-3">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Request ID</th>
                    <th>Activity Description</th>
                    <th>Requested Amount</th>
                    <th>Status</th>
                    <th>Request Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${fundRequests == null or #lists.isEmpty(fundRequests)}">
                    <td colspan="6" class="text-center">No BSA fund requests found.</td>
                </tr>
                <tr th:each="request : ${fundRequests}">
                    <td th:text="${request.fundRequestId}"></td>
                    <td th:text="${#strings.abbreviate(request.activityDescription, 50)}"></td>
                    <td th:text="${#numbers.formatDecimal(request.requestedAmount, 0, 2)} + ' Nu.'"></td>
                    <td th:text="${request.fundRequestStatus}"></td>
                    <td th:text="${#temporals.format(request.requestDate, 'MMM dd, yyyy')}"></td>
                    <td>
                        <a th:href="@{/bsa-fund-request/view/{id}(id=${request.fundRequestId})}" 
                           class="btn btn-primary btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
